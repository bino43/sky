name: Build Sky ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Sky ISO via Docker
        run: |
          # יצירת סקריפט הבנייה בתוך המכונה
          cat << 'EOF' > build_script.sh
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm archiso curl git
          
          cp -r /usr/share/archiso/configs/releng/ /tmp/sky_config
          
          # חבילות ודפדפן קל (Surf)
          echo -e "surf\nfeh\nopenbox\nxorg-server\nxorg-xinit" >> /tmp/sky_config/packages.x86_64
          
          # מחיקת דרייברים מיותרים
          sed -i '/xf86-video-/d' /tmp/sky_config/packages.x86_64
          
          # הגדרת הרקע והממשק
          mkdir -p /tmp/sky_config/airootfs/usr/share/backgrounds
          mkdir -p /tmp/sky_config/airootfs/etc/skel
          curl -L "https://istockphoto.com" -o /tmp/sky_config/airootfs/usr/share/backgrounds/sky_bg.jpg
          
          echo "feh --bg-fill /usr/share/backgrounds/sky_bg.jpg &" > /tmp/sky_config/airootfs/etc/skel/.xinitrc
          echo "exec openbox-session" >> /tmp/sky_config/airootfs/etc/skel/.xinitrc
          chmod 755 /tmp/sky_config/airootfs/etc/skel/.xinitrc
          
          # הרצת הבנייה
          mkarchiso -v -w /tmp/work_dir -o /tmp/out_dir /tmp/sky_config
          EOF

          # הרצת הכל בתוך קונטיינר מורשה (Privileged) למניעת Error 1
          docker run --privileged -v $(pwd):/workspace archlinux:latest /bin/bash /workspace/build_script.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-ISO
          path: ./*.iso # הוא יחפש את הקובץ שיצרנו
          if-no-files-found: warn
