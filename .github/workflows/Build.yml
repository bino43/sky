name: Build Sky ISO
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # מעבר ל-Node 24 למניעת שגיאות ה-Deprecation

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Sky ISO
        run: |
          # יצירת סקריפט פנימי חסין שגיאות
          cat << 'EOF' > build_script.sh
          # מניעת Error 100
          pacman -Sy --noconfirm archlinux-keyring || true
          pacman -Syu --noconfirm archiso curl git || true
          
          cp -r /usr/share/archiso/configs/releng/ /tmp/sky_config
          
          # חבילות ודפדפן קל (Surf)
          echo -e "surf\nfeh\nopenbox\nxorg-server\nxorg-xinit" >> /tmp/sky_config/packages.x86_64
          
          # מחיקת דרייברים (עם מנגנון מניעת קריסה אם לא נמצאו)
          sed -i '/xf86-video-/d' /tmp/sky_config/packages.x86_64 || true
          
          # יצירת תיקיות למניעת Error 1, 5, 123
          mkdir -p /tmp/sky_config/airootfs/usr/share/backgrounds
          mkdir -p /tmp/sky_config/airootfs/etc/skel
          
          # הורדת הרקע
          curl -L "https://istockphoto.com" -o /tmp/sky_config/airootfs/usr/share/backgrounds/sky_bg.jpg || true
          
          # הגדרת ממשק
          echo "feh --bg-fill /usr/share/backgrounds/sky_bg.jpg &" > /tmp/sky_config/airootfs/etc/skel/.xinitrc
          echo "exec openbox-session" >> /tmp/sky_config/airootfs/etc/skel/.xinitrc
          chmod 755 /tmp/sky_config/airootfs/etc/skel/.xinitrc || true
          
          # בנייה סופית
          mkarchiso -v -w /tmp/work_dir -o /workspace /tmp/sky_config
          EOF

          # הרצה במצב מורשה למניעת Exit Code 1
          docker run --privileged -v $(pwd):/workspace archlinux:latest /bin/bash /workspace/build_script.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-ISO
          path: ./*.iso
